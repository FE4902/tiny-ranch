name: Bundle Budget Gate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  bundle-budget:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Measure bundle and enforce ceilings
        run: pnpm run bundle:measure

  retention-analytics-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate retention telemetry contracts and cohort export fixtures
        run: pnpm run test:analytics:retention

  retention-soak:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run deterministic retention soak matrix
        run: pnpm run test:soak:retention

  retention-memory-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run mobile retention memory drift gate
        run: pnpm run test:soak:retention:memory

  retention-health-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build retention health snapshot
        run: pnpm run report:retention:health -- --run-playwright

      - name: Build retention baseline diff artifacts
        run: pnpm run gate:retention:baseline-diff -- --summary=artifacts/retention-health/retention-health-summary.json

      - name: Upload retention health artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retention-health-snapshot
          path: artifacts/retention-health
          if-no-files-found: error

      - name: Upload retention baseline diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retention-baseline-diff
          path: artifacts/retention-baseline-diff
          if-no-files-found: error

  retention-release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run retention release gate orchestrator
        run: pnpm run gate:retention:release -- --runtime-budgets=tests/fixtures/analytics/retention-release-gate-runtime-budgets.fixture.json

      - name: Publish retention release gate summary to CI job summary
        if: always()
        run: |
          SUMMARY_PATH="artifacts/retention-release-gate/retention-release-gate-summary.md"
          INDEX_PATH="artifacts/retention-release-gate/retention-release-gate-artifact-index.json"

          if [ -f "$SUMMARY_PATH" ]; then
            cat "$SUMMARY_PATH" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Tiny Ranch Retention Release Gate" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Summary artifact missing: \`$SUMMARY_PATH\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f "$INDEX_PATH" ]; then
            echo "Artifact index JSON: \`$INDEX_PATH\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Artifact index JSON missing: \`$INDEX_PATH\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload retention release gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retention-release-gate
          path: artifacts/retention-release-gate
          if-no-files-found: error

      - name: Upload retention release gate replay pack (failures)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: retention-release-gate-replay-pack
          path: artifacts/retention-release-gate/replay-pack
          if-no-files-found: error

  barn-mvp-release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Barn MVP release gate
        run: pnpm run gate:barn:mvp

      - name: Publish Barn MVP release gate summary to CI job summary
        if: always()
        run: |
          SUMMARY_PATH="artifacts/barn-mvp-release-gate/barn-mvp-release-gate-summary.md"
          INDEX_PATH="artifacts/barn-mvp-release-gate/barn-mvp-release-gate-artifact-index.json"

          if [ -f "$SUMMARY_PATH" ]; then
            cat "$SUMMARY_PATH" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Tiny Ranch Barn MVP Release Gate" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Summary artifact missing: \`$SUMMARY_PATH\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f "$INDEX_PATH" ]; then
            echo "Artifact index JSON: \`$INDEX_PATH\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Artifact index JSON missing: \`$INDEX_PATH\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Barn MVP release gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: barn-mvp-release-gate
          path: artifacts/barn-mvp-release-gate
          if-no-files-found: error

  mvp-release-candidate-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run MVP release-candidate gate
        run: pnpm run gate:mvp:release

      - name: Publish MVP release-candidate summary to CI job summary
        if: always()
        run: |
          SUMMARY_PATH="artifacts/mvp-release-candidate-gate/mvp-release-candidate-gate-summary.md"
          INDEX_PATH="artifacts/mvp-release-candidate-gate/mvp-release-candidate-gate-artifact-index.json"

          if [ -f "$SUMMARY_PATH" ]; then
            cat "$SUMMARY_PATH" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Tiny Ranch MVP Release-Candidate Gate" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Summary artifact missing: \`$SUMMARY_PATH\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f "$INDEX_PATH" ]; then
            echo "Artifact index JSON: \`$INDEX_PATH\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Artifact index JSON missing: \`$INDEX_PATH\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload MVP release-candidate gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mvp-release-candidate-gate
          path: artifacts/mvp-release-candidate-gate
          if-no-files-found: error

  core-loop-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run core-loop smoke suite
        run: pnpm run test:smoke --workers=1

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  save-migration-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run save migration matrix smoke suite
        run: pnpm run test:smoke:save-migration

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-save-migration
          path: playwright-report
          if-no-files-found: ignore
